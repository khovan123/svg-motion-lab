name: compiler-tests

on:
  push:
    branches:
      - main
      - fix/figma-svg-fidelity-20260623
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
      - run: npm run build:example
