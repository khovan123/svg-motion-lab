<!doctype html><html lang="vi"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SVG Motion Prototype Exporter</title><style>:root{font:13px/1.45 Inter,system-ui,sans-serif;color:var(--figma-color-text,#1f2328);background:var(--figma-color-bg,#fff)}*{box-sizing:border-box}body{margin:0;padding:16px}.stack{display:grid;gap:12px}.card{padding:12px;border:1px solid var(--figma-color-border,#ddd);border-radius:10px}.row{display:flex;gap:8px;align-items:center}.muted{color:var(--figma-color-text-secondary,#666)}.badge{display:inline-flex;padding:3px 8px;border-radius:999px;background:var(--figma-color-bg-secondary,#eef1f8);font-size:11px;font-weight:700}button{height:36px;padding:0 14px;border:0;border-radius:8px;background:var(--figma-color-bg-brand,#0d99ff);color:#fff;font:inherit;font-weight:650;cursor:pointer}button[disabled]{opacity:.5;cursor:default}input[type=checkbox]{accent-color:var(--figma-color-bg-brand,#0d99ff)}#status{min-height:70px;white-space:pre-wrap}</style><body><div class="stack"><div><div class="row"><strong>SVG Motion Prototype Exporter</strong><span class="badge">fidelity metadata v2</span></div><div class="muted">Export stable node IDs, mask/clip/filter hierarchy, vector topology và gradient transform.</div></div><div class="card stack"><label class="row"><input id="includeHidden" type="checkbox" checked> Bao gồm layer ẩn</label><label class="row"><input type="checkbox" checked disabled> Luôn kèm SVG snapshot của mọi state</label><div class="muted">Metadata nâng cao được dùng để dựng Smart Animate chính xác hơn giữa các variant.</div></div><button id="export" disabled>Đang khởi tạo exporter…</button><div id="status" class="card muted">Đang kết nối plugin runtime…</div></div><script>const button=document.querySelector('#export'),status=document.querySelector('#status');let ready=false,timer=null;function arm(){clearTimeout(timer);timer=setTimeout(()=>{status.textContent+='\nĐang chậm tại bước này. Thường do state có nhiều vector, mask, blur hoặc filter.'},15000)}button.onclick=()=>{if(!ready)return;button.disabled=true;status.textContent='Bước 1/4 · Đang đọc selection trên current page…';arm();parent.postMessage({pluginMessage:{type:'export',options:{includeHidden:document.querySelector('#includeHidden').checked,includeStateSvg:true}}},'*')};onmessage=event=>{const msg=event.data.pluginMessage||{};if(msg.type==='ready'){ready=true;button.disabled=false;button.textContent='Export prototype manifest v3';status.textContent='Sẵn sàng · fidelity metadata v2';return}if(msg.type==='error'){clearTimeout(timer);button.disabled=!ready;status.textContent='Lỗi: '+msg.message;return}if(msg.type==='progress'){status.textContent=msg.message;arm();return}if(msg.type==='manifest'){clearTimeout(timer);const data=JSON.stringify(msg.manifest,null,2),url=URL.createObjectURL(new Blob([data],{type:'application/json'})),link=document.createElement('a');link.href=url;link.download='motion-manifest.json';link.click();setTimeout(()=>URL.revokeObjectURL(url),1000);button.disabled=false;const reactions=msg.manifest.prototype&&msg.manifest.prototype.reactions?msg.manifest.prototype.reactions.length:0,snapshots=msg.manifest.states.filter(state=>Boolean(state.svg)).length;status.textContent='Đã export '+msg.manifest.schema+'\n'+msg.manifest.states.length+' state · '+reactions+' reaction · '+snapshots+' SVG snapshot · metadata v'+msg.manifest.fidelityMetadataVersion+'.'}};</script></body></html>
