<!doctype html><html lang="vi"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Standalone SVG animation</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#eef1f8;font:14px system-ui}.app{width:min(920px,calc(100vw - 32px));display:grid;gap:14px}.stage{border-radius:22px;overflow:hidden;background:#fff;box-shadow:0 24px 70px #35416229}.stage svg{display:block;width:100%}.controls{display:flex;gap:10px;flex-wrap:wrap;padding:12px;border-radius:14px;background:#fff}.controls input{position:absolute;opacity:0}.controls label,.controls a{padding:11px 14px;border:1px solid #d9deec;border-radius:10px;color:#202433;text-decoration:none;font-weight:650}.controls input:checked+label{background:#0079ea;color:#fff}.pause:checked~.stage *{animation-play-state:paused!important}.half:checked~.stage{--run-d:24s}.normal:checked~.stage{--run-d:12s}.double:checked~.stage{--run-d:6s}</style><body><main class="app"><div class="controls"><input class="pause" id="pause" type="checkbox"><label for="pause">Pause / Play</label><a href="">Restart</a><input class="half" id="half" name="speed" type="radio"><label for="half">0.5×</label><input class="normal" id="normal" name="speed" type="radio" checked><label for="normal">1×</label><input class="double" id="double" name="speed" type="radio"><label for="double">2×</label></div><div class="stage">{{SVG}}</div></main></body></html>
